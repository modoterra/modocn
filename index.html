<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="modocn is Modoterra's shadcn/ui-compatible registry for custom React components."
    />
    <title>modocn - Modoterra Custom React Components</title>
    <script>
      // Apply theme before first paint to prevent flash
      (function() {
        var t = localStorage.getItem("modocn-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace; }
      :root, [data-theme="dark"] { background: #0a0a0a; color: #ededed; }
      [data-theme="light"] { background: #fff; color: #171717; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
